name: Generate macOS Installer

on:
  workflow_dispatch:
    inputs:
      macos_version:
        type: choice
        description: "macOS Version"
        required: true
        options:
          - Sequoia
          - Sonoma
          - Ventura
          - Monterey
          - Big Sur
      file:
        type: choice
        description: "File Type"
        required: true
        options:
          - ISO
          - DMG
          - ZIP

run-name: Generate macOS Installer - ${{ github.event.inputs.macos_version }} ${{ github.event.inputs.file }}

env:
  installer_name: ""
  file_ext: ""

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Version Details
        run: |
          echo "installer_name=${{ github.event.inputs.macos_version }}" >> $GITHUB_ENV
          echo "file_ext=$(echo '${{ github.event.inputs.file }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Free up disk space
        run: |
          echo "Disk usage before cleanup:"
          df -h /
          # Remove pre-installed Xcode versions and simulators we don't need.
          # This reclaims ~30-65 GB, which the ISO/DMG build needs for its
          # temporary working image + final output (caches alone are not enough).
          sudo rm -rf /Applications/Xcode_*.app
          sudo rm -rf ~/Library/Developer/CoreSimulator/Caches/*
          sudo rm -rf ~/Library/Developer/Xcode/iOS\ DeviceSupport/*
          xcrun simctl delete all || true
          echo "Disk usage after cleanup:"
          df -h /

      - name: Install mist-cli
        run: brew install mist-cli

      - name: Generate macOS Installer
        run: |
          FILE="${{ github.event.inputs.file }}"
          NAME="${{ env.installer_name }}"
          DEST="/Users/runner/Desktop"

          case "$FILE" in
            DMG)
              sudo mist download installer "$NAME" image \
                --image-name "$NAME.dmg" --output-directory "$DEST"
              ;;
            ISO)
              sudo mist download installer "$NAME" iso \
                --iso-name "$NAME.iso" --output-directory "$DEST"
              ;;
            ZIP)
              sudo mist download installer "$NAME" application \
                --application-name "Install macOS $NAME.app" --output-directory /tmp
              cd /tmp
              zip -r "$DEST/$NAME.zip" "Install macOS $NAME.app"
              ;;
          esac
          ls -la "$DEST"

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: macOS ${{ env.installer_name }}
          path: /Users/runner/Desktop/${{ env.installer_name }}.${{ env.file_ext }}
