name: Generate macOS Installer

on:
  workflow_dispatch:
    inputs:
      macos_version:
        type: choice
        description: "macOS Version"
        required: true
        options:
          - Sonoma v14.5
          - Ventura v13.6.7
          - Monterey v12.7.5
      file:
        type: choice
        description: "File Type"
        required: true
        options:
          - ISO
          - DMG
          - ZIP

run-name: Generate macOS Installer - ${{ github.event.inputs.macos_version }} ${{ github.event.inputs.file }}

env:
  installer_version: ""
  installer_name: ""
  file_ext: ""

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Version Details
        run: |
          string="${{ github.event.inputs.macos_version }}"
          echo "installer_version=${string//*v/}" >> $GITHUB_ENV
          echo "installer_name=${string// v*/}" >> $GITHUB_ENV
          echo "file_ext=$(echo '${{ github.event.inputs.file }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install mist-cli
        run: brew install mist-cli

      - name: Generate macOS Installer
        run: |
          FILE="${{ github.event.inputs.file }}"
          VERSION="${{ env.installer_version }}"
          NAME="${{ env.installer_name }}"
          DEST="/Users/runner/Desktop"

          if [ "$FILE" = "DMG" ]; then
            sudo mist download installer "$VERSION" image --output-directory "$DEST"
            GENERATED=$(find "$DEST" -name "*.dmg" | head -1)
            mv "$GENERATED" "$DEST/$NAME.dmg"

          elif [ "$FILE" = "ISO" ]; then
            sudo mist download installer "$VERSION" iso --output-directory "$DEST"
            GENERATED=$(find "$DEST" -name "*.iso" | head -1)
            mv "$GENERATED" "$DEST/$NAME.iso"

          elif [ "$FILE" = "ZIP" ]; then
            sudo mist download installer "$VERSION" application --output-directory /tmp
            APP=$(find /tmp -name "Install macOS *.app" -maxdepth 3 | head -1)
            cd "$(dirname "$APP")"
            zip -r "$DEST/$NAME.zip" "$(basename "$APP")"
          fi

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: macOS ${{ env.installer_name }}
          path: /Users/runner/Desktop/${{ env.installer_name }}.${{ env.file_ext }}
