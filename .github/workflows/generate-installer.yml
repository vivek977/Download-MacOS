name: Generate macOS Installer

on:
  workflow_dispatch:
    inputs:
      macos_version:
        type: choice
        description: "macOS Version"
        required: true
        options:
          - Sonoma v14.5
          - Ventura v13.6.7
          - Monterey v12.7.5
      file:
        type: choice
        description: "File Type"
        required: true
        options:
          - ISO
          - DMG
          - ZIP

run-name: Generate macOS Installer - ${{ github.event.inputs.macos_version }} ${{ github.event.inputs.file }}

env:
  installer_version: ""
  installer_name: ""
  file_ext: ""
  app_path: ""

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract Version Details
        id: extract-details
        run: |
          string="${{ github.event.inputs.macos_version }}"
          echo "installer_version=${string//*v/}" >> $GITHUB_ENV
          echo "installer_name=${string// v*/}" >> $GITHUB_ENV
          echo "file_ext=$(echo '${{ github.event.inputs.file }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Install mist-cli
        run: brew install mist-cli

      - name: Download macOS Installer
        run: |
          sudo mist download installer ${{ env.installer_version }} application --output-directory /Applications --quiet

      - name: Find Installer App
        run: |
          APP_PATH=$(find /Applications -name "Install macOS *.app" -maxdepth 3 | head -1)
          echo "Found installer at: $APP_PATH"
          echo "app_path=$APP_PATH" >> $GITHUB_ENV

      - if: ${{ github.event.inputs.file == 'DMG' }}
        name: Generate macOS DMG Installer
        run: |
          sudo hdiutil create -o /tmp/'${{ env.installer_name }}' -size 16384m -volname '${{ env.installer_name }}' -layout SPUD -fs HFS+J
          sudo hdiutil attach /tmp/'${{ env.installer_name }}'.dmg -noverify -mountpoint /Volumes/'${{ env.installer_name }}'
          sleep 10
          sudo '${{ env.app_path }}/Contents/Resources/createinstallmedia' --volume /Volumes/'${{ env.installer_name }}' --nointeraction
          hdiutil eject -force /Volumes/'Install macOS ${{ env.installer_name }}'
          sudo mv /tmp/'${{ env.installer_name }}'.dmg /Users/runner/Desktop/'${{ env.installer_name }}'.dmg

      - if: ${{ github.event.inputs.file == 'ISO' }}
        name: Generate macOS ISO Installer
        run: |
          sudo hdiutil create -o /tmp/'${{ env.installer_name }}' -size 16384m -volname '${{ env.installer_name }}' -layout SPUD -fs HFS+J
          sudo hdiutil attach /tmp/'${{ env.installer_name }}'.dmg -noverify -mountpoint /Volumes/'${{ env.installer_name }}'
          sleep 20
          sudo '${{ env.app_path }}/Contents/Resources/createinstallmedia' --volume /Volumes/'${{ env.installer_name }}' --nointeraction
          sleep 100
          hdiutil eject -force /Volumes/'Install macOS ${{ env.installer_name }}'
          hdiutil convert /tmp/'${{ env.installer_name }}'.dmg -format UDTO -o /Users/runner/Desktop/'${{ env.installer_name }}'
          mv -v /Users/runner/Desktop/'${{ env.installer_name }}'.cdr /Users/runner/Desktop/'${{ env.installer_name }}'.iso
          sudo rm -fv /tmp/'${{ env.installer_name }}'.dmg

      - if: ${{ github.event.inputs.file == 'ZIP' }}
        name: Generate macOS ZIP Installer
        run: |
          APP_DIR=$(dirname '${{ env.app_path }}')
          APP_NAME=$(basename '${{ env.app_path }}')
          cd "$APP_DIR"
          zip -r "$APP_NAME.zip" "$APP_NAME"
          mv -v "$APP_NAME.zip" /Users/runner/Desktop/'${{ env.installer_name }}.zip'

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: macOS ${{ env.installer_name }}
          path: /Users/runner/Desktop/${{ env.installer_name }}.${{ env.file_ext }}
